<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>WAR SURVIVAL 3D — Playable</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{width:100%;height:100%;overflow:hidden;background:#0b1426;font-family:-apple-system,"Hiragino Sans",sans-serif;touch-action:none}
  #app{position:fixed;inset:0}
  canvas{display:block}
  #hud{position:fixed;inset:0;pointer-events:none;z-index:5}
  #top{position:absolute;top:0;left:0;right:0;height:74px;background:linear-gradient(180deg,rgba(6,12,24,.7),rgba(6,12,24,0));display:flex;align-items:center;justify-content:space-between;padding:14px 18px}
  #top .t{color:#fff;font-weight:800;font-size:20px;letter-spacing:.04em;text-shadow:0 2px 6px rgba(0,0,0,.6)}
  #top .t small{display:block;font-size:11px;font-weight:600;color:#9fbdf0;letter-spacing:.02em}
  #install{pointer-events:auto;background:linear-gradient(180deg,#3ce67e,#16b257);color:#053018;font-weight:800;font-size:14px;padding:11px 18px;border-radius:13px;box-shadow:0 6px 18px rgba(40,220,120,.4);animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  #count{position:absolute;left:50%;bottom:120px;transform:translateX(-50%);text-align:center;color:#fff;font-weight:800;font-size:46px;text-shadow:0 3px 10px rgba(0,0,0,.8);transition:transform .08s}
  #count small{display:block;font-size:14px;letter-spacing:.18em;color:#9fd4ff;font-weight:700;margin-top:-6px}
  #count.bump{transform:translateX(-50%) scale(1.3)}
  #count.hurt{color:#ff8088}
  /* enemy strength label, projected over the horde */
  #horde{position:absolute;transform:translate(-50%,-50%);color:#fff;font-weight:900;font-size:30px;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,.9);display:none;white-space:nowrap}
  #horde b{color:#ff5d6c}
  #horde .bar{width:150px;height:9px;border-radius:9px;background:rgba(0,0,0,.5);margin:5px auto 0;overflow:hidden;border:1px solid rgba(255,93,108,.5)}
  #horde .bar>i{display:block;height:100%;background:linear-gradient(90deg,#ff7d5c,#ff2d45)}
  #tut{position:absolute;left:50%;bottom:200px;transform:translateX(-50%);color:#fff;font-weight:700;font-size:22px;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.7);animation:fade 1.3s ease-in-out infinite}
  #tut .hand{font-size:40px;display:block;margin-top:6px}
  @keyframes fade{0%,100%{opacity:.55}50%{opacity:1}}
  .float{position:absolute;font-weight:800;font-size:34px;text-shadow:0 2px 8px rgba(0,0,0,.7);pointer-events:none;animation:rise 1s ease-out forwards}
  @keyframes rise{0%{opacity:0;transform:translate(-50%,0) scale(.6)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-90px) scale(1.1)}}
  #warn{position:absolute;left:50%;top:120px;transform:translateX(-50%);color:#ff5d6c;font-weight:900;font-size:34px;letter-spacing:.1em;text-shadow:0 2px 12px rgba(255,0,0,.5);opacity:0;transition:opacity .15s}
  #end{position:fixed;inset:0;z-index:9;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,9,18,.85);text-align:center;padding:24px}
  #end .title{font-size:74px;font-weight:900;letter-spacing:.04em;margin-bottom:6px}
  #end .sub{color:#fff;font-size:22px;font-weight:700;margin-bottom:18px}
  #end .emoji{font-size:88px;margin:6px 0 16px}
  #end .lead{color:#cfe0ff;font-size:17px;margin-bottom:18px}
  #card{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:14px 18px;border-radius:18px;margin-bottom:26px}
  #card .ic{width:62px;height:62px;border-radius:15px;background:linear-gradient(150deg,#3f7bd8,#c8323c);display:flex;align-items:center;justify-content:center;font-size:34px}
  #card .meta{text-align:left;color:#fff}
  #card .meta b{font-size:20px}
  #card .meta .st{color:#ffd24d;font-size:16px}
  #card .meta .sm{color:#9fb6df;font-size:13px}
  #cta{background:linear-gradient(180deg,#43ef86,#16b257);color:#053018;font-weight:900;font-size:26px;padding:20px 52px;border-radius:20px;box-shadow:0 12px 36px rgba(40,220,120,.5);animation:pulse 1s ease-in-out infinite;cursor:pointer}
  #conf{position:absolute;inset:0;overflow:hidden;pointer-events:none}
</style>
</head>
<body>
<div id="app"></div>
<div id="hud">
  <div id="top"><div class="t">WAR SURVIVAL<small>最後の軍隊を生き残らせろ</small></div><div id="install">インストール</div></div>
  <div id="warn">⚠ 敵 大群 接近</div>
  <div id="horde"><span>💀 <b id="hordeN">0</b></span><div class="bar"><i id="hordeBar"></i></div></div>
  <div id="tut">◀ ドラッグで部隊を動かせ ▶<span class="hand">👆</span></div>
  <div id="count">10<small>UNITS</small></div>
</div>
<div id="end">
  <div id="conf"></div>
  <div class="title" id="endTitle">勝利！</div>
  <div class="sub" id="endSub">あなたの軍隊が生き残った</div>
  <div class="emoji" id="endEmoji">🏆</div>
  <div class="lead">続きはアプリで本物の戦争を体験</div>
  <div id="card"><div class="ic">⚔️</div><div class="meta"><b>War Survival</b><div class="st">★★★★★</div><div class="sm">4.8 ・ 無料</div></div></div>
  <div id="cta">今すぐプレイ ▶</div>
</div>

<script src="./three.min.js"></script>
<script>
const STORE_URL="https://play.google.com/store/apps/details?id=com.example.app";
function fireClick(){ try{ if(window.mraid&&mraid.open) mraid.open(STORE_URL); else window.open(STORE_URL,"_blank"); }catch(e){ try{window.open(STORE_URL,"_blank");}catch(_){} } }

/* ---------- renderer / scene ---------- */
const app=document.getElementById("app");
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputEncoding=THREE.sRGBEncoding;
app.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a1322);
scene.fog=new THREE.Fog(0x0a1322,30,92);

const camera=new THREE.PerspectiveCamera(56,innerWidth/innerHeight,0.1,300);
const CAM=new THREE.Vector3(0,6.9,11.2);
camera.position.copy(CAM); camera.lookAt(0,1.1,-12);

scene.add(new THREE.HemisphereLight(0xcfe0ff,0x18233c,1.0));
const dir=new THREE.DirectionalLight(0xffffff,1.15); dir.position.set(7,18,9); scene.add(dir);
const rim=new THREE.DirectionalLight(0x6fa8ff,0.6); rim.position.set(-6,5,12); scene.add(rim);

/* ---------- road ---------- */
function roadTex(){ const c=document.createElement("canvas"); c.width=128; c.height=256; const x=c.getContext("2d");
  x.fillStyle="#13203a"; x.fillRect(0,0,128,256);
  x.fillStyle="#192c4d"; for(let i=0;i<256;i+=64) x.fillRect(0,i,128,3);
  x.strokeStyle="rgba(150,180,255,.4)"; x.lineWidth=4; x.setLineDash([26,22]);
  x.beginPath(); x.moveTo(64,0); x.lineTo(64,256); x.stroke();
  x.fillStyle="rgba(120,150,220,.22)"; x.fillRect(7,0,4,256); x.fillRect(117,0,4,256);
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(2,18); return t; }
const RW=9, roadMap=roadTex();
const road=new THREE.Mesh(new THREE.PlaneGeometry(RW*2,400),new THREE.MeshStandardMaterial({map:roadMap,roughness:1}));
road.rotation.x=-Math.PI/2; road.position.z=-150; scene.add(road);
const flankMat=new THREE.MeshStandardMaterial({color:0x081021,roughness:1});
for(const s of [-1,1]){ const f=new THREE.Mesh(new THREE.PlaneGeometry(44,400),flankMat); f.rotation.x=-Math.PI/2; f.position.set(s*(RW+22),-0.05,-150); scene.add(f); }

/* ---------- character parts (multi-instanced low-poly soldiers) ---------- */
const dummy=new THREE.Object3D();
function box(w,h,d,x,y,z){ const g=new THREE.BoxGeometry(w,h,d); g.translate(x||0,y||0,z||0); return g; }
function partMesh(geo,color,max,emissive){ const m=new THREE.MeshStandardMaterial({color,roughness:.62,metalness:.05,emissive:emissive||0x000000,emissiveIntensity:emissive?0.9:0});
  const im=new THREE.InstancedMesh(geo,m,max); im.count=0; im.instanceMatrix.setUsage(THREE.DynamicDrawUsage); im.frustumCulled=false; scene.add(im); return im; }
const MAXP=70, MAXE=320, MAXB=200;
// player soldier: boots, navy uniform, skin head, combat helmet, rifle (forward -z)
const playerParts=[
  partMesh(box(0.5,0.5,0.42,0,0.25,0),0x222b40,MAXP),
  partMesh(box(0.56,0.62,0.46,0,0.81,0),0x3f6fc8,MAXP),
  partMesh(box(0.16,0.5,0.18,0.36,0.85,0),0x355aa0,MAXP),
  partMesh(box(0.34,0.32,0.34,0,1.27,0),0xe6c39c,MAXP),
  partMesh(box(0.44,0.2,0.48,0,1.48,0),0x2c4a2c,MAXP),
  partMesh(box(0.1,0.1,0.74,0.26,0.92,-0.34),0x15171d,MAXP),
];
// enemy mutant: dark legs, blood-red torso, pale head, glowing eyes, arms reaching forward (+z)
const enemyParts=[
  partMesh(box(0.5,0.5,0.42,0,0.25,0),0x3a1010,MAXE),
  partMesh(box(0.62,0.66,0.5,0,0.83,0),0xc0303a,MAXE),
  partMesh(box(0.16,0.52,0.18,0.4,0.86,0),0x8a2224,MAXE),
  partMesh(box(0.38,0.36,0.36,0,1.29,0),0xcdb494,MAXE),
  partMesh(box(0.1,0.09,0.09,0.1,1.33,0.19),0xff2a2a,MAXE,0xff0000),
  partMesh(box(0.1,0.09,0.09,-0.1,1.33,0.19),0xff2a2a,MAXE,0xff0000),
  partMesh(box(0.52,0.16,0.42,0,1.0,0.38),0x7a1c1c,MAXE),
];
function fillParts(meshes,list,n){ const k=Math.min(list.length,n);
  for(let i=0;i<k;i++){ const p=list[i]; dummy.position.set(p.x,p.y||0,p.z); dummy.rotation.y=p.r||0; dummy.scale.setScalar(p.s||1); dummy.updateMatrix();
    for(const m of meshes) m.setMatrixAt(i,dummy.matrix); }
  for(const m of meshes){ m.count=k; m.instanceMatrix.needsUpdate=true; }
}
// bullets
function bMesh(color,emissive){ return partMesh(new THREE.SphereGeometry(0.13,6,6),color,MAXB,emissive); }
const bulletP=[bMesh(0xffe27a,0xffcc33)], bulletE=[bMesh(0xff6a6a,0xff2222)];

/* ---------- gates ---------- */
const gates=[];
function gateTex(txt,hex){ const c=document.createElement("canvas"); c.width=c.height=256; const x=c.getContext("2d");
  x.strokeStyle=hex; x.lineWidth=14; x.strokeRect(12,12,232,232);
  x.shadowColor=hex; x.shadowBlur=26; x.fillStyle="#fff"; x.font="bold 116px sans-serif"; x.textAlign="center"; x.textBaseline="middle"; x.fillText(txt,128,140);
  return new THREE.CanvasTexture(c); }
function makeGate(z,left,right){ const g=new THREE.Group(); g.position.z=z;
  for(const [d,cx] of [[left,-2.25],[right,2.25]]){ const ok=d.good, col=ok?0x39e57e:0xff4d63, hex=ok?"#39e57e":"#ff4d63";
    const fill=new THREE.Mesh(new THREE.PlaneGeometry(4.4,3.3),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.22,side:THREE.DoubleSide}));
    fill.position.set(cx,1.75,0); g.add(fill);
    const tx=new THREE.Mesh(new THREE.PlaneGeometry(3,3),new THREE.MeshBasicMaterial({map:gateTex(d.op+d.v,hex),transparent:true,side:THREE.DoubleSide}));
    tx.position.set(cx,1.75,0.05); g.add(tx);
    const post=new THREE.Mesh(new THREE.BoxGeometry(.18,3.5,.18),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.7}));
    post.position.set(cx+(cx<0?-2.2:2.2),1.75,0); g.add(post);
  }
  scene.add(g); const o={g,left,right,done:false}; gates.push(o); return o; }

/* ---------- state & balance ---------- */
let state="TUTORIAL", last=0, squadX=0, targetX=0, count=10, started=false, drag=false;
let shake=0, warnT=0, hurtT=0;
const events=[]; let bP=[], bE=[];
const apply=(op,v,c)=>op==="+"?c+v:op==="−"?Math.max(0,c-v):op==="×"?c*v:Math.max(0,c/v);
const good=g=>g.op==="×"||(g.op==="+"&&g.v>=8);
const G=(op,v)=>({op,v,good:good({op,v})});

const WORLD=14, CHARGE=11;
const FIRE=0.50, EFIRE=0.42;      // Lanchester square-law exchange — bigger army wins, both bleed

function addWave(z,n,final){ events.push({type:"wave",z,count:n,max:n,charge:false,final:!!final}); }
function buildTrack(){
  makeGate(-30, G("×",2), G("+",5));
  makeGate(-58, G("×",2), G("÷",2));
  addWave(-86, 18);
  makeGate(-116, G("×",3), G("−",20));
  makeGate(-146, G("+",40), G("÷",2));
  addWave(-178, 60);
  makeGate(-208, G("×",2), G("−",90));
  addWave(-262, 300, true);         // FINAL CRUSH — must out-power it to live
}

/* ---------- input ---------- */
const px=cx=>cx/innerWidth*2-1;
const cvs=renderer.domElement;
function down(cx){ if(state==="END"){fireClick();return;} started=true; if(state==="TUTORIAL"){state="PLAY"; document.getElementById("tut").style.display="none";}
  targetX=THREE.MathUtils.clamp(px(cx)*5.2,-3.7,3.7); drag=true; }
function move(cx){ if(drag) targetX=THREE.MathUtils.clamp(px(cx)*5.2,-3.7,3.7); }
cvs.addEventListener("touchstart",e=>{e.preventDefault();down(e.touches[0].clientX);},{passive:false});
cvs.addEventListener("touchmove", e=>{e.preventDefault();move(e.touches[0].clientX);},{passive:false});
cvs.addEventListener("touchend", ()=>drag=false);
cvs.addEventListener("mousedown",e=>down(e.clientX));
cvs.addEventListener("mousemove",e=>move(e.clientX));
addEventListener("mouseup",()=>drag=false);
document.getElementById("install").onclick=fireClick;
document.getElementById("cta").onclick=fireClick;
document.getElementById("end").onclick=fireClick;

/* ---------- hud ---------- */
const elCount=document.getElementById("count"), elWarn=document.getElementById("warn");
const elHorde=document.getElementById("horde"), elHordeN=document.getElementById("hordeN"), elHordeBar=document.getElementById("hordeBar");
function setCount(v){ elCount.firstChild.textContent=Math.max(0,Math.round(v)); }
function bump(hurt){ elCount.classList.add("bump"); if(hurt){elCount.classList.add("hurt");} setTimeout(()=>{elCount.classList.remove("bump");elCount.classList.remove("hurt");},120); }
function floatTxt(txt,col){ const d=document.createElement("div"); d.className="float"; d.textContent=txt; d.style.color=col; d.style.left="50%"; d.style.bottom="190px"; document.getElementById("hud").appendChild(d); setTimeout(()=>d.remove(),1000); }
function spawnB(arr,x,y,z){ if(arr.length>=MAXB)return; arr.push({x,y,z}); }

/* ---------- update ---------- */
const plist=[], elist=[], bplist=[], belist=[];
const proj=new THREE.Vector3();
function update(dt){
  squadX+=(targetX-squadX)*Math.min(1,dt*10);
  roadMap.offset.y-=dt*(state==="PLAY"?0.95:0.25);
  shake*=Math.pow(.0006,dt); warnT-=dt; elWarn.style.opacity=warnT>0?Math.min(1,warnT*2.5):0;
  let nearWave=null;

  if(state==="PLAY"){
    for(const o of gates){ o.g.position.z+=WORLD*dt;
      if(!o.done && o.g.position.z>=0){ o.done=true; const side=squadX<0?o.left:o.right, before=count;
        count=Math.max(0,Math.min(999,apply(side.op,side.v,before))); const d=Math.round(count-before);
        floatTxt((d>=0?"+":"")+d, d>=0?"#6dffa6":"#ff6b7d"); bump(d<0); shake=Math.max(shake,.15);
      }
    }
    for(let i=gates.length-1;i>=0;i--){ if(gates[i].g.position.z>8){ scene.remove(gates[i].g); gates.splice(i,1);} }

    for(const e of events){ if(e.count<=0)continue;
      let adv=WORLD;
      if(e.z>-30){ if(!e.charge){e.charge=true; warnT=1.5;} adv+=CHARGE; }
      e.z+=adv*dt;
      if(e.z>0) e.z=0;                      // a living wave grinds at the front line, can't pass
      if(e.z<6 && e.z>=-0.6 && count>0 && e.count>0){
        const A=count, B=e.count;           // simultaneous square-law exchange
        e.count=Math.max(0,B-A*FIRE*dt);
        count  =Math.max(0,A-B*EFIRE*dt);
        hurtT=0.12;
        if(e.z<1.6) shake=Math.max(shake,.5);
        if(Math.random()<A*dt*0.5) spawnB(bP,squadX+(Math.random()-.5)*2.5,0.95,e.z);
        if(Math.random()<B*dt*0.25) spawnB(bE,(Math.random()-.5)*5,1.0,1.0);
        if(count<=0){ count=0; setCount(0); return endGame(false); }
      }
      if(e.z>-40 && e.z<3 && (!nearWave || e.z>nearWave.z)) nearWave=e;
    }
    const fin=events.find(e=>e.final);
    if(fin && fin.count<=0){ return endGame(true); }
  }

  setCount(count);
  elCount.style.color = hurtT>0 ? "#ff8088" : "#fff"; hurtT-=dt;

  // horde strength label projected over the nearest wave
  if(nearWave){ proj.set(0,3.4,nearWave.z).project(camera);
    elHorde.style.display="block";
    elHorde.style.left=(proj.x*.5+.5)*innerWidth+"px";
    elHorde.style.top=(-proj.y*.5+.5)*innerHeight+"px";
    elHordeN.textContent=Math.round(nearWave.count);
    elHordeBar.style.width=Math.max(0,Math.min(100,nearWave.count/nearWave.max*100))+"%";
  } else elHorde.style.display="none";

  /* instances */
  plist.length=0; const pv=Math.min(Math.round(count),MAXP), pc=8;
  for(let i=0;i<pv;i++){ const r=(i/pc)|0,c=i%pc; plist.push({x:squadX+(c-(pc-1)/2)*0.64,y:Math.sin(performance.now()*0.007+i)*0.05,z:0.7+r*0.62}); }
  fillParts(playerParts,plist,MAXP);

  elist.length=0;
  for(const e of events){ if(e.count<=0)continue; const n=Math.min(Math.round(e.count),MAXE),ec=14;
    for(let i=0;i<n;i++){ const r=(i/ec)|0,c=i%ec; elist.push({x:(c-(ec-1)/2)*0.56,y:Math.sin(performance.now()*0.009+i)*0.05,z:e.z-r*0.56}); } }
  fillParts(enemyParts,elist,MAXE);

  // bullets
  bplist.length=0; for(const b of bP){ b.z-=42*dt; if(b.z>-40) bplist.push({x:b.x,y:b.y,z:b.z}); } bP=bP.filter(b=>b.z>-40);
  fillParts(bulletP,bplist,MAXB);
  belist.length=0; for(const b of bE){ b.z+=30*dt; if(b.z<3) belist.push({x:b.x,y:b.y,z:b.z}); } bE=bE.filter(b=>b.z<3);
  fillParts(bulletE,belist,MAXB);

  camera.position.set(CAM.x+(Math.random()-.5)*shake,CAM.y+(Math.random()-.5)*shake,CAM.z);
}

/* ---------- end ---------- */
function endGame(win){ if(state==="END")return; state="END";
  const t=document.getElementById("endTitle"),s=document.getElementById("endSub"),em=document.getElementById("endEmoji");
  elHorde.style.display="none"; document.getElementById("count").style.display="none"; elWarn.style.opacity=0;
  if(win){ t.textContent="勝利！"; t.style.color="#6dffa6"; t.style.textShadow="0 0 26px rgba(109,255,166,.7)"; s.textContent="あなたの軍隊が生き残った"; em.textContent="🏆"; document.getElementById("cta").textContent="今すぐプレイ ▶"; confetti(); }
  else { t.textContent="全滅…"; t.style.color="#ff7a86"; t.style.textShadow="0 0 24px rgba(255,80,90,.6)"; s.textContent="部隊が押しつぶされた"; em.textContent="💀"; document.getElementById("cta").textContent="リベンジ ▶"; }
  document.getElementById("end").style.display="flex";
}
function confetti(){ const c=document.getElementById("conf"); for(let i=0;i<60;i++){ const p=document.createElement("div"); const col=["#ffd24d","#ff5d8f","#5dd0ff","#6dffa6"][i%4];
  p.style.cssText=`position:absolute;width:9px;height:14px;background:${col};left:${Math.random()*100}%;top:-20px;opacity:.9;transform:rotate(${Math.random()*360}deg);animation:drop ${1.6+Math.random()*1.6}s linear ${Math.random()*0.8}s forwards`; c.appendChild(p); }
  if(!document.getElementById("confkf")){ const st=document.createElement("style"); st.id="confkf"; st.textContent="@keyframes drop{to{top:108%;transform:rotate(720deg)}}"; document.head.appendChild(st); } }

/* ---------- loop ---------- */
buildTrack();
function frame(now){ const dt=Math.min(.05,(now-last)/1000||0); last=now; update(dt); renderer.render(scene,camera); requestAnimationFrame(frame); }
requestAnimationFrame(frame);
addEventListener("resize",()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
</script>
</body>
</html>
